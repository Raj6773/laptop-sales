<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laptop Details</title>

<link rel="stylesheet" href="style.css">

<style>

.product-page{
display:flex;
gap:40px;
max-width:1200px;
margin:auto;
padding:40px;
}

.product-gallery{
flex:1;
}

.product-gallery img{
width:100%;
border-radius:10px;
}

.thumbnails{
display:flex;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

.thumbnails img{
width:70px;
cursor:pointer;
border-radius:6px;
}

.product-info{
flex:1;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

.price{
font-size:26px;
font-weight:bold;
margin:10px 0;
}

@media(max-width:800px){

.product-page{
flex-direction:column;
padding:20px;
}

}

</style>

</head>

<body>

<div class="product-page">

<div class="product-gallery">

<img id="mainImage" src="">

<div class="thumbnails" id="thumbs"></div>

</div>

<div class="product-info" id="productInfo"></div>

</div>

<script type="module" src="product.js"></script>

</body>
</html>
