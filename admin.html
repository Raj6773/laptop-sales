<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:6px 0;
}

button{
padding:10px 20px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Admin Panel</h1>

<div class="card">

<h2>Add Laptop</h2>

<input id="id" placeholder="Laptop ID">
<input id="brand" placeholder="Brand">
<input id="model" placeholder="Model">

<input id="price" placeholder="Price">
<input id="processor" placeholder="Processor">

<input id="ram" placeholder="RAM">
<input id="storage" placeholder="Storage">

<input id="condition" placeholder="Condition">
<input id="battery" placeholder="Battery">

<input id="keyboard" placeholder="Keyboard">
<input id="fingerprint" placeholder="Fingerprint">

<input id="note" placeholder="Note">
<input id="link" placeholder="Original Link">

<button onclick="addLaptop()">Add Laptop</button>

</div>

<div id="laptopList"></div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
