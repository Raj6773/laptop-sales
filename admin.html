<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
margin-bottom:30px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
}

button{
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}

.file{
border:2px dashed #ccc;
padding:20px;
text-align:center;
margin-top:10px;
}

img{
width:120px;
margin:5px;
border-radius:6px;
}

</style>

</head>

<div class="card">

<h2>Analytics</h2>

<div id="analytics"></div>

</div>

<body>

<header>

<h1>Laptop Store Admin</h1>

</header>

<div class="container">

<div class="card">

<h2>Add Laptop</h2>

<input id="id" placeholder="Laptop ID">

<input id="brand" placeholder="Brand (HP / Lenovo)">
<input id="model" placeholder="Model">

<input id="price" placeholder="Price">

<input id="processor" placeholder="Processor">
<input id="ram" placeholder="RAM">
<input id="storage" placeholder="Storage">

<input id="condition" placeholder="Condition">
<input id="battery" placeholder="Battery">

<input id="keyboard" placeholder="Keyboard">
<input id="fingerprint" placeholder="Fingerprint">

<input id="note" placeholder="Note">
<input id="link" placeholder="Original Laptop Link">

<div class="file" id="dropZone">

<p>Drag & Drop Images Here</p>
<p>or Click to Upload</p>

<input type="file" id="images" multiple hidden>

<div id="preview"></div>

</div>

<button onclick="addLaptop()">Add Laptop</button>

</div>

<div id="list"></div>

</div>

<script type="module" src="admin.js"></script>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

</body>
</html>
